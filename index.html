<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.0/jquery.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/styles-login.css">
  
  <title>Login</title>


</head>

<body translate="no">
  <div class="d-flex flex-column justify-content-center align-items-center min-vh-100 px-3">
    <!-- Logo -->
    <div class="mb-3">
      <img src="assets/img/general/logo-copia.png" alt="Logo" class="img-fluid" style="width:180px;">
    </div>

    <!-- Formulario -->
    <div class="form-container text-center mb-4 col-11 col-sm-5 col-md-5 col-lg-3 col-xl-3 col-xxl-3">
      <h1 class="mb-4" style="font-size: 2rem;">Login</h1>
      <form id="formLogin" class="d-flex flex-column" action="auth/login-script.php" method="POST">
        <div class="input-container">
          <label>Usuario</label>
          <input id="inputUsuario" class="mb-2" type="text" name="usuario" required>
        </div>
        <div class="input-container input-pass">
          <label>Password</label>
          <input id="inputPass" class="mb-2" type="password" name="password" required>
            <button type="button" class="btn-toggle-password" onclick="togglePassword()">
              <i class="bi bi-eye" id="iconEye"></i>
            </button>
        </div>
        <div class="d-grid mt-4">
          <button type="submit" class="btn btn-login py-2 rounded-pill">INGRESAR</button>
        </div>
      </form>
      <p class="mt-3" style="font-size: 0.8rem;">Para registrar un usuario, contactar el área de sistemas.</p>
    </div>

    <!-- Slogan -->
    <div class="text-slogan">Somos Creadores de Soluciones</div>
  </div>

  <footer>
    <p>&copy; Sellos y Retenes de San Luis S.A. de C.V. Todos los derechos reservados.</p>
  </footer>

<script>
  function togglePassword() {
    const input = document.getElementById("inputPass");
    const icon = document.getElementById("iconEye");

    if (input.type === "password") {
      input.type = "text";
      icon.classList.remove("bi-eye");
      icon.classList.add("bi-eye-slash");
    } else {
      input.type = "password";
      icon.classList.remove("bi-eye-slash");
      icon.classList.add("bi-eye");
    }
  }
</script>

</body>
</html>
