<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Campeonato Frontend</title>
    <style>
        :root {
            --color-1: #647FBC;
            --color-2: #91ADC8;
            --color-3: #AED6CF;
            --color-4: #FAFDD6;
            --bg-dark: #121212;
            --bg-light: #F0F4F8;
            --text-dark: var(--color-4);
            --text-light: #333;
            --card-dark: #1E1E1E;
            --card-light: #FFFFFF;
            --input-border-dark: #3A3A3A;
            --input-border-light: #D9D9D9;
        }

        /* Detección de tema oscuro */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: var(--bg-dark);
                color: var(--text-dark);
            }
            .login-card {
                background-color: var(--card-dark);
            }
            .input-group input {
                border-color: var(--input-border-dark);
                color: var(--text-dark);
            }
        }
        
        /* Detección de tema claro */
        @media (prefers-color-scheme: light) {
            body {
                background-color: var(--bg-light);
                color: var(--text-light);
            }
            .login-card {
                background-color: var(--card-light);
            }
            .input-group input {
                border-color: var(--input-border-light);
                color: var(--text-light);
            }
        }

        /* Estilos base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: background-color 0.5s, color 0.5s;
            overflow: hidden;
        }

        .background-circles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .background-circles div {
            position: absolute;
            background: rgba(145, 173, 200, 0.1);
            border-radius: 50%;
            animation: moveCircle 15s linear infinite;
        }

        .background-circles div:nth-child(1) { width: 60px; height: 60px; top: 10%; left: 20%; animation-delay: 0s; }
        .background-circles div:nth-child(2) { width: 100px; height: 100px; top: 70%; left: 80%; animation-delay: 2s; }
        .background-circles div:nth-child(3) { width: 80px; height: 80px; top: 40%; left: 50%; animation-delay: 4s; }
        .background-circles div:nth-child(4) { width: 120px; height: 120px; top: 20%; left: 60%; animation-delay: 6s; }
        .background-circles div:nth-child(5) { width: 90px; height: 90px; top: 90%; left: 10%; animation-delay: 8s; }
        .background-circles div:nth-child(6) { width: 70px; height: 70px; top: 50%; left: 90%; animation-delay: 10s; }
        .background-circles div:nth-child(7) { width: 110px; height: 110px; top: 80%; left: 30%; animation-delay: 12s; }

        @keyframes moveCircle {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 50%; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; }
        }

        .login-card {
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            animation: fadeIn 1s ease-in-out;
            border: 1px solid var(--input-border-dark);
            transition: background-color 0.5s, border-color 0.5s;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .login-header h1 {
            font-size: 2.2em;
            color: var(--color-1);
            margin-bottom: 5px;
            animation: slideIn 0.8s ease-out;
        }

        .login-header p {
            font-size: 1em;
            color: var(--color-2);
            animation: slideIn 1s ease-out;
        }

        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 12px;
            background: transparent;
            border: 2px solid var(--input-border-dark);
            border-radius: 8px;
            font-size: 1.1em;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--color-3);
            box-shadow: 0 0 10px rgba(174, 214, 207, 0.5);
        }

        .input-group label {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-2);
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus ~ label,
        .input-group input:not(:placeholder-shown) ~ label {
            top: 0;
            left: 8px;
            font-size: 0.8em;
            background-color: var(--card-dark);
            padding: 0 5px;
            color: var(--color-3);
            transform: translateY(-50%);
        }

        .login-button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, var(--color-1), var(--color-2));
            color: var(--color-4);
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            text-transform: uppercase;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(100, 127, 188, 0.4);
        }
        
        .login-button:active {
            transform: translateY(0);
        }

        .forgot-password {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9em;
        }

        .forgot-password a {
            color: var(--color-3);
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .forgot-password a:hover {
            color: var(--color-1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="background-circles">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>

    <div class="login-card">
        <div class="login-header">
            <h1>Acceder a la Plataforma</h1>
            <p>Por favor, ingresa tus credenciales</p>
        </div>
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" required placeholder=" ">
                <label for="username">Nombre de usuario</label>
            </div>
            <div class="input-group">
                <input type="password" id="password" required placeholder=" ">
                <label for="password">Contraseña</label>
            </div>
            <button type="submit" class="login-button">Iniciar Sesión</button>
        </form>
        <div class="forgot-password">
            <a href="#">¿Olvidaste tu contraseña?</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username && password) {
                alert('Login exitoso! Bienvenido, ' + username);
            } else {
                alert('Por favor, completa todos los campos.');
            }
        });
    </script>
</body>
</html>
