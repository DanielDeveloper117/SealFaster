<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Campeonato Frontend</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --color1: #647FBC;
            --color2: #91ADC8;
            --color3: #AED6CF;
            --color4: #FAFDD6;
            --bg-dark: #1a1f36;
            --text-dark: #ffffff;
            --bg-light: #f5f7ff;
            --text-light: #2d3748;
            --card-bg-dark: #222b45;
            --card-bg-light: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.5s, color 0.5s;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-light);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        body.dark-mode {
            background: var(--bg-dark);
            color: var(--text-dark);
        }

        .background-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.3;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            background: var(--color1);
            top: -100px;
            left: -100px;
        }

        .shape-2 {
            width: 200px;
            height: 200px;
            background: var(--color2);
            bottom: -50px;
            right: 100px;
        }

        .shape-3 {
            width: 150px;
            height: 150px;
            background: var(--color3);
            top: 50%;
            left: 70%;
        }

        .shape-4 {
            width: 100px;
            height: 100px;
            background: var(--color4);
            bottom: 20%;
            left: 10%;
        }

        .container {
            width: 90%;
            max-width: 450px;
            z-index: 1;
        }

        .card {
            background: var(--card-bg-light);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            transform: translateY(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        body.dark-mode .card {
            background: var(--card-bg-dark);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.15);
        }

        body.dark-mode .card:hover {
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.4);
        }

        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .logo h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(45deg, var(--color1), var(--color3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .logo p {
            color: var(--color2);
            font-size: 1rem;
        }

        body.dark-mode .logo p {
            color: var(--color3);
        }

        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--color1);
        }

        body.dark-mode .input-group label {
            color: var(--color2);
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
        }

        body.dark-mode .input-group input {
            background: rgba(26, 31, 54, 0.6);
            border-color: #2d3748;
            color: var(--text-dark);
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--color1);
            box-shadow: 0 0 0 3px rgba(100, 127, 188, 0.3);
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 42px;
            color: var(--color1);
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .remember {
            display: flex;
            align-items: center;
        }

        .remember input {
            margin-right: 5px;
        }

        .forgot {
            color: var(--color1);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .forgot:hover {
            color: var(--color3);
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--color1), var(--color2));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(100, 127, 188, 0.4);
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(100, 127, 188, 0.6);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .separator {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: #a0aec0;
        }

        .separator::before,
        .separator::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }

        body.dark-mode .separator::before,
        body.dark-mode .separator::after {
            border-bottom: 1px solid #2d3748;
        }

        .separator span {
            padding: 0 10px;
        }

        .social-login {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 1.5rem;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--card-bg-light);
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        body.dark-mode .social-btn {
            background: var(--card-bg-dark);
            border: 1px solid #2d3748;
        }

        .social-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .social-btn i {
            color: var(--color1);
            font-size: 1.2rem;
        }

        .register {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }

        .register a {
            color: var(--color1);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .register a:hover {
            color: var(--color3);
            text-decoration: underline;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--card-bg-light);
            border: 2px solid var(--color1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        body.dark-mode .theme-toggle {
            background: var(--card-bg-dark);
        }

        .theme-toggle:hover {
            transform: rotate(15deg);
        }

        .theme-toggle i {
            color: var(--color1);
            font-size: 1.2rem;
        }

        @media (max-width: 500px) {
            .card {
                padding: 1.5rem;
            }
            
            .options {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .forgot {
                margin-top: 5px;
            }
        }

        /* Animaciones */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .shape-1 {
            animation: float 15s ease-in-out infinite;
        }

        .shape-2 {
            animation: float 12s ease-in-out infinite;
            animation-delay: 1s;
        }

        .shape-3 {
            animation: float 10s ease-in-out infinite;
            animation-delay: 2s;
        }

        .shape-4 {
            animation: float 8s ease-in-out infinite;
            animation-delay: 3s;
        }
    </style>
</head>
<body class="light-mode">
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
    </div>

    <button class="theme-toggle" onclick="toggleTheme()">
        <i class="fas fa-moon"></i>
    </button>

    <div class="container">
        <div class="card">
            <div class="logo">
                <h1>Bienvenido</h1>
                <p>Ingresa a tu cuenta para continuar</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Correo electrónico</label>
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="tu@email.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="options">
                    <div class="remember">
                        <input type="checkbox" id="remember">
                        <label for="remember">Recordarme</label>
                    </div>
                    <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-login">Iniciar Sesión</button>
            </form>

            <div class="separator">
                <span>o continúa con</span>
            </div>

            <div class="social-login">
                <div class="social-btn">
                    <i class="fab fa-google"></i>
                </div>
                <div class="social-btn">
                    <i class="fab fa-facebook-f"></i>
                </div>
                <div class="social-btn">
                    <i class="fab fa-twitter"></i>
                </div>
            </div>

            <div class="register">
                ¿No tienes una cuenta? <a href="#">Regístrate ahora</a>
            </div>
        </div>
    </div>

    <script>
        // Detectar preferencia de tema del navegador
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.body.classList.add('dark-mode');
            document.querySelector('.theme-toggle i').classList.remove('fa-moon');
            document.querySelector('.theme-toggle i').classList.add('fa-sun');
        }

        // Alternar entre modo claro y oscuro
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            document.body.classList.toggle('light-mode');
            
            const icon = document.querySelector('.theme-toggle i');
            if (document.body.classList.contains('dark-mode')) {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            } else {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
            }
        }

        // Validación del formulario
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                alert('Por favor, completa todos los campos');
                return;
            }
            
            // Simulación de inicio de sesión exitoso
            const btn = document.querySelector('.btn-login');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Iniciando sesión...';
            btn.disabled = true;
            
            setTimeout(() => {
                alert('¡Inicio de sesión exitoso! Bienvenido de nuevo.');
                btn.innerHTML = 'Iniciar Sesión';
                btn.disabled = false;
            }, 2000);
        });

        // Efectos de hover mejorados para inputs
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('focused');
            });
            
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('focused');
            });
        });
    </script>
</body>
</html>
