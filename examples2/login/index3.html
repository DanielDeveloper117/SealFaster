<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Campeonato Frontend</title>
    <style>
        :root {
    --color-primary: #647FBC;
    --color-secondary: #91ADC8;
    --color-tertiary: #AED6CF;
    --color-background: #0d1117; /* Fondo oscuro */
    --color-text-light: #FAFDD6;
    --color-box-bg: #161b22;
    --color-border: #21262d;
    --color-shadow: #010409;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

body {
    background-color: var(--color-background);
    color: var(--color-text-light);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    animation: fadeIn 1.5s ease-in-out;
}

.login-container {
    perspective: 1000px;
}

.login-box {
    background-color: var(--color-box-bg);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 40px;
    box-shadow: 0 15px 35px var(--color-shadow);
    max-width: 400px;
    width: 90%;
    text-align: center;
    transform-style: preserve-3d;
    animation: rotateIn 1s ease-out;
}

.login-title {
    color: var(--color-primary);
    font-size: 2.5em;
    font-weight: 700;
    margin-bottom: 10px;
    letter-spacing: 1px;
}

.login-subtitle {
    color: var(--color-secondary);
    font-size: 1em;
    margin-bottom: 30px;
}

.input-group {
    position: relative;
    margin-bottom: 30px;
}

.input-group input {
    width: 100%;
    padding: 10px;
    background-color: transparent;
    border: none;
    border-bottom: 2px solid var(--color-border);
    color: var(--color-text-light);
    font-size: 1.1em;
    outline: none;
    transition: all 0.3s ease;
}

.input-group input:focus {
    border-bottom-color: var(--color-tertiary);
}

.input-group label {
    position: absolute;
    top: 10px;
    left: 0;
    color: var(--color-secondary);
    pointer-events: none;
    transition: all 0.3s ease;
}

.input-group input:focus ~ label,
.input-group input:not(:placeholder-shown) ~ label {
    top: -20px;
    left: 0;
    font-size: 0.8em;
    color: var(--color-tertiary);
}

.show-password {
    position: absolute;
    right: 0;
    top: 10px;
    cursor: pointer;
    color: var(--color-secondary);
    transition: color 0.3s ease;
}

.show-password:hover {
    color: var(--color-text-light);
}

.login-button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 5px;
    background: linear-gradient(90deg, var(--color-primary), var(--color-tertiary));
    color: #fff;
    font-size: 1.2em;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    text-transform: uppercase;
}

.login-button:hover {
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgba(100, 127, 188, 0.4);
}

.social-login {
    margin-top: 25px;
    font-size: 0.9em;
    color: var(--color-secondary);
}

.social-icons {
    margin-top: 15px;
    display: flex;
    justify-content: center;
    gap: 15px;
}

.social-icon {
    display: inline-flex;
    justify-content: center;
    align-items: center;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background-color: var(--color-border);
    color: var(--color-tertiary);
    font-size: 1.2em;
    font-weight: bold;
    text-decoration: none;
    transition: transform 0.3s ease, background-color 0.3s ease;
}

.social-icon:hover {
    transform: scale(1.1);
    background-color: var(--color-primary);
    color: var(--color-text-light);
}

.register-link {
    margin-top: 20px;
    font-size: 0.9em;
}

.register-link a {
    color: var(--color-tertiary);
    text-decoration: none;
    transition: color 0.3s ease;
}

.register-link a:hover {
    color: var(--color-primary);
}

/* Animaciones */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes rotateIn {
    from { transform: rotateY(90deg) scale(0.5); opacity: 0; }
    to { transform: rotateY(0deg) scale(1); opacity: 1; }
}
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1 class="login-title">Acceder</h1>
            <p class="login-subtitle">Introduce tus datos para continuar</p>
            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="username" required>
                    <label for="username">Usuario</label>
                </div>
                <div class="input-group">
                    <input type="password" id="password" required>
                    <label for="password">Contraseña</label>
                    <span class="show-password" onclick="togglePasswordVisibility()">👁️</span>
                </div>
                <button type="submit" class="login-button">Entrar</button>
            </form>
            <div class="social-login">
                <p>O accede con:</p>
                <div class="social-icons">
                    <a href="#" class="social-icon google">G</a>
                    <a href="#" class="social-icon facebook">F</a>
                    <a href="#" class="social-icon twitter">T</a>
                </div>
            </div>
            <div class="register-link">
                ¿No tienes cuenta? <a href="#">Regístrate aquí</a>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
    const loginForm = document.getElementById('loginForm');
    
    // Función para manejar el envío del formulario
    loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        // Simulación de validación
        if (username.length > 0 && password.length > 0) {
            alert('¡Acceso exitoso! Bienvenido, ' + username);
            // Aquí iría el código para redirigir al usuario o manejar la sesión.
        } else {
            alert('Por favor, ingresa un usuario y una contraseña.');
        }
    });

    // Función para mostrar/ocultar la contraseña
    window.togglePasswordVisibility = () => {
        const passwordInput = document.getElementById('password');
        const showPasswordSpan = document.querySelector('.show-password');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            showPasswordSpan.textContent = '🙈';
        } else {
            passwordInput.type = 'password';
            showPasswordSpan.textContent = '👁️';
        }
    };
});
    </script>
</body>
</html>
