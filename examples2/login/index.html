<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Campeonato Frontend</title>
  <style>
    /* ================== RESET ================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      transition: background 0.5s ease, color 0.5s ease;
    }

    :root {
      --c1: #647FBC;
      --c2: #91ADC8;
      --c3: #AED6CF;
      --c4: #FAFDD6;

      --bg-light: #FAFDD6;
      --bg-dark: #1a1a1a;
      --text-light: #1a1a1a;
      --text-dark: #FAFDD6;
    }

    [data-theme="light"] {
      --bg: var(--bg-light);
      --text: var(--text-light);
    }

    [data-theme="dark"] {
      --bg: var(--bg-dark);
      --text: var(--text-dark);
    }

    /* ================== CONTENEDOR ================== */
    .login-container {
      width: 380px;
      padding: 2.5rem;
      background: linear-gradient(145deg, var(--c1), var(--c2), var(--c3));
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
      position: relative;
      overflow: hidden;
      animation: fadeIn 1.2s ease;
    }

    .login-container::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, var(--c4) 0%, transparent 60%);
      animation: rotateBg 12s linear infinite;
      z-index: 0;
    }

    @keyframes rotateBg {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-content {
      position: relative;
      z-index: 1;
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--c4), var(--text));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glow 3s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px var(--c1); }
      to { text-shadow: 0 0 20px var(--c3); }
    }

    /* ================== INPUTS ================== */
    .form-group {
      margin-bottom: 1.5rem;
      position: relative;
    }

    .form-group input {
      width: 100%;
      padding: 14px 12px;
      border: none;
      border-radius: 8px;
      outline: none;
      background: rgba(255, 255, 255, 0.8);
      color: #333;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    [data-theme="dark"] .form-group input {
      background: rgba(0, 0, 0, 0.6);
      color: var(--c4);
    }

    .form-group label {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.9rem;
      color: #555;
      pointer-events: none;
      transition: all 0.3s ease;
    }

    .form-group input:focus + label,
    .form-group input:not(:placeholder-shown) + label {
      top: -8px;
      left: 8px;
      font-size: 0.75rem;
      color: var(--c4);
    }

    /* ================== BOTON ================== */
    .btn {
      width: 100%;
      padding: 14px;
      background: var(--c1);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background: var(--c2);
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    /* ================== EXTRA ================== */
    .extras {
      display: flex;
      justify-content: space-between;
      margin-top: 1rem;
      font-size: 0.85rem;
    }

    .extras a {
      color: var(--c4);
      text-decoration: none;
      transition: color 0.3s;
    }

    .extras a:hover {
      color: var(--text);
    }

    /* ================== TOGGLE TEMA ================== */
    .theme-toggle {
      margin-top: 1.5rem;
      text-align: center;
    }

    .theme-toggle button {
      padding: 8px 16px;
      border: 2px solid var(--c4);
      border-radius: 20px;
      background: transparent;
      color: var(--c4);
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.3s ease;
    }

    .theme-toggle button:hover {
      background: var(--c4);
      color: var(--text-light);
    }

    /* ================== RESPONSIVE ================== */
    @media (max-width: 450px) {
      .login-container {
        width: 90%;
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-content">
      <div class="login-header">
        <h1>Bienvenido</h1>
      </div>
      <form>
        <div class="form-group">
          <input type="text" id="usuario" placeholder=" " required>
          <label for="usuario">Usuario</label>
        </div>
        <div class="form-group">
          <input type="password" id="password" placeholder=" " required>
          <label for="password">Contraseña</label>
        </div>
        <button type="submit" class="btn">Ingresar</button>
      </form>
      <div class="extras">
        <a href="#">¿Olvidaste tu contraseña?</a>
        <a href="#">Crear cuenta</a>
      </div>
      <div class="theme-toggle">
        <button type="button" id="toggleTheme">Cambiar tema</button>
      </div>
    </div>
  </div>

  <script>
    // ================== TOGGLE DARK/LIGHT ==================
    const toggleBtn = document.getElementById("toggleTheme");
    const htmlTag = document.documentElement;

    toggleBtn.addEventListener("click", () => {
      if (htmlTag.getAttribute("data-theme") === "light") {
        htmlTag.setAttribute("data-theme", "dark");
      } else {
        htmlTag.setAttribute("data-theme", "light");
      }
    });

    // Detectar tema preferido del sistema
    if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
      htmlTag.setAttribute("data-theme", "dark");
    }
  </script>
</body>
</html>
