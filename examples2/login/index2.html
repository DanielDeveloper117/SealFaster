<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Champion Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #647FBC;
            --secondary: #91ADC8;
            --accent: #AED6CF;
            --light: #FAFDD6;
            --dark-bg: #1a1a1a;
            --dark-card: #2d2d2d;
            --text-dark: #333;
            --text-light: #fff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-main: var(--dark-bg);
                --card-bg: var(--dark-card);
                --text-color: var(--text-light);
                --input-bg: rgba(100, 127, 188, 0.1);
                --border-color: var(--primary);
            }
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-main: linear-gradient(135deg, var(--light) 0%, var(--accent) 100%);
                --card-bg: rgba(255, 255, 255, 0.95);
                --text-color: var(--text-dark);
                --input-bg: rgba(250, 253, 214, 0.8);
                --border-color: var(--secondary);
            }
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .background-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.1;
        }

        .floating-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .shape:nth-child(1) {
            width: 80px;
            height: 80px;
            background: var(--primary);
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 60px;
            height: 60px;
            background: var(--secondary);
            top: 60%;
            right: 15%;
            animation-delay: -2s;
        }

        .shape:nth-child(3) {
            width: 100px;
            height: 100px;
            background: var(--accent);
            bottom: 20%;
            left: 20%;
            animation-delay: -4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        .login-container {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.15),
                0 0 0 1px rgba(100, 127, 188, 0.2);
            width: 100%;
            max-width: 420px;
            border: 2px solid transparent;
            background-clip: padding-box;
            animation: slideIn 1s cubic-bezier(0.16, 1, 0.3, 1);
            transition: all 0.3s ease;
        }

        .login-container:hover {
            transform: translateY(-5px);
            box-shadow: 
                0 35px 70px rgba(0, 0, 0, 0.2),
                0 0 0 1px rgba(100, 127, 188, 0.3);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .logo h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        .logo p {
            color: var(--text-color);
            opacity: 0.7;
            font-size: 1.1rem;
            animation: fadeInUp 1s ease 0.3s both;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 5px rgba(100, 127, 188, 0.3)); }
            to { filter: drop-shadow(0 0 15px rgba(100, 127, 188, 0.6)); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 0.7;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
            animation: fadeInUp 1s ease both;
        }

        .form-group:nth-child(2) { animation-delay: 0.4s; }
        .form-group:nth-child(3) { animation-delay: 0.5s; }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-color);
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }

        .input-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 16px;
        }

        .input-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(100, 127, 188, 0.4), transparent);
            transition: left 0.5s;
            z-index: 1;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            background: var(--input-bg);
            color: var(--text-color);
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 2;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(100, 127, 188, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(100, 127, 188, 0.2);
        }

        .form-group input:focus + .input-wrapper::before {
            left: 100%;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            animation: fadeInUp 1s ease 0.6s both;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-color);
            font-size: 0.9rem;
        }

        .remember input[type="checkbox"] {
            accent-color: var(--primary);
            width: 18px;
            height: 18px;
        }

        .forgot-link {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .forgot-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        .forgot-link:hover::after {
            width: 100%;
        }

        .login-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 1s ease 0.7s both;
        }

        .login-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .login-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(100, 127, 188, 0.4);
        }

        .login-button:hover::before {
            left: 100%;
        }

        .login-button:active {
            transform: translateY(-1px);
        }

        .divider {
            text-align: center;
            margin: 30px 0;
            position: relative;
            animation: fadeInUp 1s ease 0.8s both;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-color), transparent);
        }

        .divider span {
            background: var(--card-bg);
            padding: 0 20px;
            color: var(--text-color);
            opacity: 0.6;
            font-size: 0.9rem;
        }

        .social-login {
            display: flex;
            gap: 15px;
            animation: fadeInUp 1s ease 0.9s both;
        }

        .social-btn {
            flex: 1;
            padding: 14px;
            border: 2px solid var(--border-color);
            border-radius: 14px;
            background: var(--input-bg);
            color: var(--text-color);
            text-decoration: none;
            text-align: center;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .social-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background: var(--accent);
            transition: width 0.3s ease;
            z-index: -1;
        }

        .social-btn:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .social-btn:hover::before {
            width: 100%;
        }

        @media (max-width: 480px) {
            .login-container {
                margin: 20px;
                padding: 35px 25px;
            }
            
            .logo h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="background-animation">
        <div class="floating-shapes">
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>
        </div>
    </div>

    <div class="login-container">
        <div class="logo">
            <h1>Champion</h1>
            <p>Accede a tu cuenta</p>
        </div>

        <form>
            <div class="form-group">
                <label for="email">Correo electronico</label>
                <div class="input-wrapper">
                    <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
            </div>

            <div class="remember-forgot">
                <label class="remember">
                    <input type="checkbox" id="remember">
                    Recordarme
                </label>
                <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="login-button">Iniciar Sesion</button>
        </form>

        <div class="divider">
            <span>o continua con</span>
        </div>

        <div class="social-login">
            <a href="#" class="social-btn">Google</a>
            <a href="#" class="social-btn">GitHub</a>
        </div>
    </div>

    <script>
        // Animacion de entrada dinamica
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.querySelector('.login-container');
            const inputs = document.querySelectorAll('input');
            const button = document.querySelector('.login-button');
            
            // Efecto de entrada con delay
            setTimeout(() => {
                container.style.transform = 'translateY(0) scale(1)';
                container.style.opacity = '1';
            }, 100);
            
            // Animacion de inputs al enfocar
            inputs.forEach(input => {
                input.addEventListener('focus', function() {
                    this.parentElement.style.transform = 'scale(1.02)';
                });
                
                input.addEventListener('blur', function() {
                    this.parentElement.style.transform = 'scale(1)';
                });
            });
            
            // Animacion del boton
            button.addEventListener('click', function(e) {
                e.preventDefault();
                
                const ripple = document.createElement('div');
                ripple.style.position = 'absolute';
                ripple.style.borderRadius = '50%';
                ripple.style.background = 'rgba(255,255,255,0.6)';
                ripple.style.transform = 'scale(0)';
                ripple.style.animation = 'ripple 0.6s linear';
                ripple.style.left = '50%';
                ripple.style.top = '50%';
                ripple.style.width = ripple.style.height = '100px';
                ripple.style.marginLeft = ripple.style.marginTop = '-50px';
                
                this.appendChild(ripple);
                
                setTimeout(() => {
                    ripple.remove();
                }, 600);
                
                // Simulacion de carga
                this.innerHTML = 'Iniciando sesion...';
                this.style.background = 'linear-gradient(135deg, var(--accent), var(--secondary))';
                
                setTimeout(() => {
                    this.innerHTML = 'Iniciar Sesion';
                    this.style.background = 'linear-gradient(135deg, var(--primary), var(--secondary))';
                }, 2000);
            });
        });
        
        // Animacion CSS adicional para ripple
        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple {
                to {
                    transform: scale(4);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
