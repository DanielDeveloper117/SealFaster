<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selector de Clientes - Campeonato Frontend</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chosen/1.8.7/chosen.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chosen/1.8.7/chosen.jquery.min.js"></script>
    <style>
        /* Variables y estilos generales proporcionados */
        :root {
            --primary-bg: #0a0f0a;
            --secondary-bg: #1a2f1a;
            --accent-bg: #2d4a2d;
            --surface-bg: rgba(45, 74, 45, 0.1);
            --glass-bg: rgba(26, 47, 26, 0.15);
            --text-primary: #e8f5e8;
            --text-secondary: #b8d4b8;
            --border-color: rgba(85, 173, 155, 0.3);
            --glow-color: #55ad9b;
            --shadow-color: rgba(0, 0, 0, 0.8);
            --gradient-primary: linear-gradient(135deg, #1a2f1a 0%, #396339 50%, #0a0f0a 100%);
            --gradient-surface: linear-gradient(145deg, rgba(26, 47, 26, 0.2) 0%, rgba(45, 74, 45, 0.1) 100%);
            --box-shadow-rotator: 0px 0px 30px 30px rgb(37 65 42 / 51%);
            --span-status:#55ad9b;
            --bg-table-row:#4e775380;
            --card-glow: rgba(85, 173, 155, 0.2);
            --particle-color: rgba(85, 173, 155, 0.1);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --primary-bg: #f0f8f0;
                --secondary-bg: #e6f2e6;
                --accent-bg: #d1e7d1;
                --surface-bg: rgba(209, 231, 209, 0.3);
                --glass-bg: rgba(230, 242, 230, 0.4);
                --text-primary: #1a3d1a;
                --text-secondary: #2d5a2d;
                --border-color: rgba(85, 173, 155, 0.4);
                --glow-color: #55ad9b;
                --shadow-color: rgba(0, 0, 0, 0.15);
                --gradient-primary: linear-gradient(135deg, #f0f8f0 0%, #e6f2e6 50%, #d1e7d1 100%);
                --gradient-surface: linear-gradient(145deg, rgba(230, 242, 230, 0.6) 0%, rgba(209, 231, 209, 0.3) 100%);
                --box-shadow-rotator: none;
                --span-status:#00876cde;
                --bg-table-row:#99be9e30;
                --card-glow: rgba(85, 173, 155, 0.3);
                --particle-color: rgba(85, 173, 155, 0.15);
            }
        }

        body {
            background: var(--gradient-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            margin: 0;
            position: relative;
            overflow-x: hidden;
            padding-top: 70px !important;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }

        .section-container {
            border-radius: 10px;
            padding: 2%;
            width: 90%;
            max-width: 600px;
            border-bottom: 2px solid #55ad9b85;
            background-color: #fff;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px var(--shadow-color), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            padding: 2%;
            color: var(--text-primary);
            animation: fadeIn 1.5s ease-in-out;
        }

        /* Estilos del selector Chosen */
        .chosen-container {
            font-size: 1.2rem;
            width: 100% !important;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease-in-out;
            animation: bounceIn 1s ease-out;
        }
        
        /* Estilos del contenedor principal del selector */
        .chosen-container .chosen-single {
            background: var(--surface-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 2px 5px var(--shadow-color);
            height: 50px;
            line-height: 50px;
            color: var(--text-primary);
            transition: all 0.3s ease-in-out;
            font-weight: 600;
        }

        .chosen-container .chosen-single span {
            color: var(--text-primary);
            transition: color 0.3s ease;
        }

        /* Efecto de foco en el selector */
        .chosen-container-active.chosen-container-single .chosen-single {
            border-color: var(--glow-color);
            box-shadow: 0 0 15px var(--glow-color);
        }

        .chosen-container .chosen-single div b {
            background-image: none !important;
            display: block;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            border-bottom: 2px solid var(--text-primary);
            border-right: 2px solid var(--text-primary);
            transform-origin: center;
            transition: transform 0.3s ease;
            transform: translateY(-50%) rotate(45deg);
        }

        .chosen-container-active .chosen-single div b {
            transform: translateY(-50%) rotate(-135deg);
        }

        /* Estilos del menú desplegable */
        .chosen-container .chosen-drop {
            background-color: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-top: none;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 10px 20px var(--shadow-color);
            transition: all 0.3s ease-in-out;
        }

        /* Estilos de las opciones */
        .chosen-container .chosen-results li {
            padding: 12px 15px;
            color: var(--text-secondary);
            transition: background-color 0.2s, color 0.2s;
            position: relative;
            z-index: 1;
        }

        .chosen-container .chosen-results li:hover {
            background-color: var(--accent-bg);
            color: var(--text-primary);
            cursor: pointer;
        }
        
        .chosen-container .chosen-results li.highlighted {
            background-color: var(--accent-bg);
            color: var(--text-primary);
        }

        .chosen-container .chosen-results li.result-selected {
            background-color: var(--accent-bg) !important;
            color: var(--text-primary) !important;
            font-weight: bold;
        }

        /* Estilos de la barra de búsqueda */
        .chosen-container .chosen-search input[type="text"] {
            background-color: var(--accent-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
            margin: 5px 10px;
            width: calc(100% - 20px);
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .chosen-container .chosen-search input[type="text"]::placeholder {
            color: var(--text-secondary);
        }

        /* Animaciones */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounceIn {
            0% { transform: scale(0.1); opacity: 0; }
            60% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="section-container">
        <h2 style="text-align:center; color: var(--text-primary); margin-bottom: 20px;">
            Selector de Clientes
        </h2>
        <select id="selectorCliente" class="" style="z-index:999;">
            <option value="" disabled selected>Seleccione un cliente</option>
            </select>
    </div>

    <script>
        // Inicialización de Chosen.js
        $(document).ready(function() {
            $('#selectorCliente').chosen({
                no_results_text: "Cliente no encontrado.",
                width: "100%",
                placeholder_text_single: "Seleccione un cliente",
                allow_single_deselect: true
            });

            // Simulación de carga de datos con AJAX para demostrar el dinamismo
            // En un entorno real, la URL sería un endpoint del servidor
            function cargarClientes() {
                setTimeout(() => {
                    const clientes = [
                        { id: 1, name: "Cliente A" },
                        { id: 2, name: "Cliente B" },
                        { id: 3, name: "Cliente C" },
                        { id: 4, name: "Cliente D" },
                        { id: 5, name: "Cliente E" }
                    ];

                    const selector = $('#selectorCliente');
                    selector.empty(); // Limpiar opciones existentes
                    selector.append('<option value="" disabled selected>Seleccione un cliente</option>'); // Placeholder

                    clientes.forEach(cliente => {
                        const option = `<option value="${cliente.id}">${cliente.name}</option>`;
                        selector.append(option);
                    });
                    
                    // Actualizar el selector de Chosen
                    selector.trigger("chosen:updated");
                }, 1000);
            }

            cargarClientes();
        });
    </script>
</body>
</html>
