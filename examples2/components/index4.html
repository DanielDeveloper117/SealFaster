<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selector Estilizado - Ronda 3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/chosen-js@1.8.7/chosen.min.css" rel="stylesheet">
    <style>
        /* Variables de color basadas en el tema del sitio */
        :root {
            --primary-bg: #0a0f0a;
            --secondary-bg: #1a2f1a;
            --accent-bg: #2d4a2d;
            --surface-bg: rgba(45, 74, 45, 0.1);
            --glass-bg: rgba(26, 47, 26, 0.15);
            --text-primary: #e8f5e8;
            --text-secondary: #b8d4b8;
            --border-color: rgba(85, 173, 155, 0.3);
            --glow-color: #55ad9b;
            --shadow-color: rgba(0, 0, 0, 0.8);
            --gradient-primary: linear-gradient(135deg, #1a2f1a 0%, #396339 50%, #0a0f0a 100%);
            --gradient-surface: linear-gradient(145deg, rgba(26, 47, 26, 0.2) 0%, rgba(45, 74, 45, 0.1) 100%);
            --box-shadow-rotator: 0px 0px 30px 30px rgb(37 65 42 / 51%);
            --span-status: #55ad9b;
            --bg-table-row: #4e775380;
            --card-glow: rgba(85, 173, 155, 0.2);
            --particle-color: rgba(85, 173, 155, 0.1);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --primary-bg: #f0f8f0;
                --secondary-bg: #e6f2e6;
                --accent-bg: #d1e7d1;
                --surface-bg: rgba(209, 231, 209, 0.3);
                --glass-bg: rgba(230, 242, 230, 0.4);
                --text-primary: #1a3d1a;
                --text-secondary: #2d5a2d;
                --border-color: rgba(85, 173, 155, 0.4);
                --glow-color: #55ad9b;
                --shadow-color: rgba(0, 0, 0, 0.15);
                --gradient-primary: linear-gradient(135deg, #f0f8f0 0%, #e6f2e6 50%, #d1e7d1 100%);
                --gradient-surface: linear-gradient(145deg, rgba(230, 242, 230, 0.6) 0%, rgba(209, 231, 209, 0.3) 100%);
                --box-shadow-rotator: none;
                --span-status: #00876cde;
                --bg-table-row: #99be9e30;
                --card-glow: rgba(85, 173, 155, 0.3);
                --particle-color: rgba(85, 173, 155, 0.15);
            }
        }

        body {
            background: var(--gradient-primary);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            margin: 0;
            position: relative;
            overflow-x: hidden;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .section-container {
            border-radius: 10px;
            padding: 2rem;
            width: 100%;
            max-width: 600px;
            border-bottom: 2px solid #55ad9b85;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 
                0 20px 40px var(--shadow-color),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 1.8rem;
        }

        /* Estilos personalizados para Chosen */
        .chosen-container {
            width: 100% !important;
            font-family: inherit;
        }

        .chosen-container-single .chosen-single {
            background: var(--surface-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            height: 50px;
            line-height: 50px;
            padding: 0 15px;
            color: var(--text-primary);
            font-size: 1rem;
            box-shadow: 0 4px 15px var(--shadow-color);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .chosen-container-single .chosen-single span {
            color: var(--text-primary);
            width: 100%;
        }

        .chosen-container-active.chosen-with-drop .chosen-single {
            border-radius: 12px 12px 0 0;
            border-color: var(--glow-color);
            box-shadow: 0 0 0 3px var(--card-glow), 0 4px 15px var(--shadow-color);
            background: var(--accent-bg);
        }

        .chosen-container-single .chosen-single div {
            width: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chosen-container-single .chosen-single div b {
            background: none !important;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: transform 0.3s ease;
        }

        .chosen-container-active .chosen-single div b {
            transform: rotate(180deg);
        }

        .chosen-container-single .chosen-single div b:before {
            content: "⌄";
            font-size: 1.2rem;
            font-weight: bold;
        }

        .chosen-container .chosen-drop {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-top: none;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 10px 25px var(--shadow-color);
            margin-top: 0;
        }

        .chosen-container .chosen-results {
            color: var(--text-primary);
            margin: 0;
            padding: 10px 0;
            max-height: 300px;
        }

        .chosen-container .chosen-results li {
            padding: 12px 15px;
            font-size: 1rem;
            transition: all 0.2s ease;
            color: var(--text-primary);
        }

        .chosen-container .chosen-results li.highlighted {
            background: var(--card-glow);
            color: var(--text-primary);
            background-image: none;
        }

        .chosen-container .chosen-results li:hover {
            background: var(--accent-bg);
            color: var(--text-primary);
        }

        .chosen-container .chosen-results li.no-results {
            background: transparent;
            color: var(--text-secondary);
            font-style: italic;
        }

        .chosen-container .chosen-results li em {
            background: var(--glow-color);
            color: white;
            font-style: normal;
            padding: 0 2px;
            border-radius: 3px;
        }

        .chosen-container-multi .chosen-choices {
            background: var(--surface-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            min-height: 50px;
            padding: 5px 10px;
            box-shadow: 0 4px 15px var(--shadow-color);
            backdrop-filter: blur(10px);
        }

        .chosen-container-multi .chosen-choices li.search-choice {
            background: var(--accent-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            padding: 5px 25px 5px 10px;
            margin: 5px 0 5px 5px;
            box-shadow: 0 2px 8px var(--shadow-color);
        }

        .chosen-container-multi .chosen-choices li.search-choice .search-choice-close {
            top: 6px;
            right: 5px;
            color: var(--text-secondary);
        }

        .chosen-container-multi .chosen-choices li.search-field input[type="text"] {
            color: var(--text-primary);
            height: 30px;
        }

        /* Loading animation for AJAX */
        .chosen-container .chosen-results.loading:before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            margin: -10px 0 0 -10px;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-color);
            border-top: 2px solid var(--glow-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Focus state */
        .chosen-container.chosen-container-active .chosen-single,
        .chosen-container.chosen-container-active .chosen-choices {
            box-shadow: 0 0 0 3px var(--card-glow), 0 4px 15px var(--shadow-color);
            border-color: var(--glow-color);
        }

        /* Darken the dropdown on light mode for better contrast */
        @media (prefers-color-scheme: light) {
            .chosen-container .chosen-drop {
                background: var(--secondary-bg);
            }
            
            .chosen-container .chosen-results li {
                color: var(--text-primary);
            }
            
            .chosen-container .chosen-results li.highlighted {
                background: var(--accent-bg);
            }
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            
            .section-container {
                padding: 1.5rem;
            }
            
            .chosen-container-single .chosen-single {
                height: 45px;
                line-height: 45px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="section-container">
        <h1>Selector de Clientes</h1>
        
        <select id="selectorCliente" class="chosen-select" data-placeholder="Seleccione un cliente">
            <option value=""></option>
            <option value="1">Cliente Premium S.A.</option>
            <option value="2">Empresa Solutions Ltda.</option>
            <option value="3">Global Tech Innovations</option>
            <option value="4">Servicios Digitales Avanzados</option>
            <option value="5">Consultoría Estratégica Internacional</option>
        </select>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chosen-js@1.8.7/chosen.jquery.min.js"></script>
    <script>
        // Inicializar Chosen
        $(document).ready(function() {
            $(".chosen-select").chosen({
                width: "100%",
                search_contains: true,
                no_results_text: "No se encontraron resultados para:",
                allow_single_deselect: true
            });
            
            // Simular carga AJAX después de 1.5 segundos
            setTimeout(function() {
                // Agregar opciones adicionales (simulando respuesta AJAX)
                $('#selectorCliente').append(
                    $('<option></option>').val('6').text('Nuevos Clientes Unidos'),
                    $('<option></option>').val('7').text('Tech Solutions Global'),
                    $('<option></option>').val('8').text('Innovación Digital S.A.'),
                    $('<option></option>').val('9').text('Servicios Corporativos Integrados'),
                    $('<option></option>').val('10').text('Consultoría Estratégica Mundial')
                );
                
                // Actualizar Chosen con las nuevas opciones
                $('#selectorCliente').trigger('chosen:updated');
            }, 1500);
        });

        // Detectar tema del sistema y aplicar estilos
        function detectColorScheme() {
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
        }

        // Ejecutar al cargar y cuando cambie la preferencia
        detectColorScheme();
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', detectColorScheme);
    </script>
</body>
</html>
